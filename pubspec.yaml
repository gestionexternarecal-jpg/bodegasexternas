name: gestion_externa
description: "Gestion Externa - transferencias internas Odoo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  logger: ^2.5.0
  intl: ^0.20.2
  data_table_2: ^2.6.0
  window_manager: ^0.4.3
  file_picker: ^11.0.2
  excel: ^4.0.6
  printing: ^5.14.3
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: assets/icons/app_icon.png
  windows:
    generate: true
    image_path: assets/icons/app_icon.png
    icon_size: 256
  android: false
  ios: false
  web:
    generate: true
    image_path: assets/icons/app_icon.png
    background_color: "#0077B6"
    theme_color: "#0077B6"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png
